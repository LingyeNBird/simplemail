# ============================================================
# TempMail 临时邮箱平台 - 单容器部署（前后端分离）
# Nginx（前端静态文件 + API 反向代理）+ Go API + Postfix
# ============================================================
#
# ╔═══════════════════════════════════════════════════════════╗
# ║  端口速查                                                 ║
# ╠════════════╦════════════╦═════════════════════════════════╣
# ║ 80  (对外) ║ nginx      ║ 前端 Web 界面（含 API 反代）     ║
# ║ 25  (对外) ║ postfix    ║ SMTP 收信                        ║
# ╚════════════╩════════════╩═════════════════════════════════╝
#
# 容器内部端口说明：
#   - Nginx 监听 8080（对外映射），提供前端 + 反代 API
#   - Go API 监听 127.0.0.1:8081（仅容器内部，不对外暴露）
#   - Postfix 监听 25（对外映射）
#
# ★ 修改端口：只改冒号左边（宿主机端口），右边不要动。
#   例如把 Web 改到 8888：ports: ["8888:8080"]
#
name: tempmail

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "80:8080"
      - "25:25"
    volumes:
      - ./data:/data
    environment:
      DB_DSN: ${API_DB_PATH:-/data/tempmail.db}
      RATE_LIMIT: ${API_RATE_LIMIT:-500}
      RATE_WINDOW: ${API_RATE_WINDOW:-60}
      SMTP_SERVER_IP: ${SMTP_SERVER_IP}
      SMTP_HOSTNAME: ${SMTP_HOSTNAME}
      ADMIN_KEY_FILE: /data/admin.key
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
